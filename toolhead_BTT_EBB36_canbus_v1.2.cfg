# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: 94bdde06b761

[adxl345]
cs_pin: EBBCan: PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

#[extruder]                        ; Entire section moved to Printer.cfg for SAFE_CONFIG - TNK 22-Nov-25
#step_pin: EBBCan: PD0
#dir_pin: !EBBCan: PD1
#enable_pin: !EBBCan: PD2
#microsteps: 16
#rotation_distance: 33.500
#nozzle_diameter: 0.400			; Change for which Revo nozzle is installed: 0.200 , 0.400 , 0.600 , 0.800
#filament_diameter: 1.750
#heater_pin: EBBCan: PB13
#sensor_type: ATC Semitec 104NT-4-R025H42G	#Default: EPCOS 100K B57560G104F
#sensor_pin: EBBCan: PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
#min_temp: 0
#max_temp: 250

#[tmc2209 extruder]
#uart_pin: EBBCan: PA15
#interpolate: True                     ; set per LDO Orbiter v2.0 instructions
#run_current: 0.750                    ; set per LDO Orbiter v2.0 instructions
#sense_resistor: 0.110
#stealthchop_threshold: 0              ; Set to 0 for spreadcycle, avoid using stealthchop on extruder
#driver_TBL: 0                         ; set per LDO Orbiter v2.0 instructions
#driver_HEND: 6                        ; set per LDO Orbiter v2.0 instructions
#driver_HSTRT: 7                       ; set per LDO Orbiter v2.0 instructions
#driver_TOFF: 4                        ; set per LDO Orbiter v2.0 instructions

[fan]						; Print Cooling Fan - FAN1
pin: EBBCan: PA1
kick_start_time: 0.5
off_below: 0.10
hardware_pwm: false

[heater_fan hotend_fan]				; Hotend Fan - FAN2
pin: EBBCan: PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0					; If you are experiencing back flow, you can reduce fan_speed

#[neopixel hotend_rgb]
#pin: EBBCan:PD3

#[bltouch]
#sensor_pin: ^EBBCan:PB8
#control_pin: EBBCan:PB9

#[filament_switch_sensor switch_sensor]
#switch_pin: EBBCan:PB4

#[filament_motion_sensor motion_sensor]
#switch_pin: ^EBBCan:PB3
