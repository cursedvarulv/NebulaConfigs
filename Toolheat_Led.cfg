[gcode_shell_command turn_off_cam_led]
command =  v4l2-ctl -d /dev/video2 --set-ctrl=backlight_compensation=0
timeout = 5.0
verbose = True

[gcode_shell_command turn_on_cam_led]
command =  v4l2-ctl -d /dev/video2 --set-ctrl=backlight_compensation=1
timeout = 5.0
verbose = True

[gcode_macro SET_NOZZLE_LEDS_OFF]
gcode:
  RUN_SHELL_COMMAND CMD=turn_off_cam_led

[gcode_macro SET_NOZZLE_LEDS_On]
gcode:
  RUN_SHELL_COMMAND CMD=turn_on_cam_led