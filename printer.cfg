###################
# THERMAL SECTION #
###################

[heater_bed]
heater_pin: PA1
sensor_pin: PB1 # TB 
sensor_type: Generic 3950
max_power: 1.0
#control: watermark
min_temp: 0
max_temp: 130

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
full_steps_per_rotation: 200    ; LDO 1.8 motor
rotation_distance: 4.706        ; Original # 4.637 | Second time: 4.683
nozzle_diameter: 0.400			; Change for which Revo nozzle is installed: 0.200 , 0.400 , 0.600 , 0.800
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G	#Default: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
max_extrude_only_distance: 780
#max_extrude_only_velocity: 18 #120       ; set for LDO Orbiter v2.0
max_extrude_cross_section: 5
pressure_advance: .050

[tmc2209 extruder]
uart_pin: EBBCan: PA15
interpolate: True                    ; set per LDO Orbiter v2.0 instructions
run_current: 0.750                    ; set per LDO Orbiter v2.0 instructions
sense_resistor: 0.110
stealthchop_threshold: 0              ; Set to 0 for spreadcycle, avoid using stealthchop on extruder
driver_TBL: 0                         ; set per LDO Orbiter v2.0 instructions
driver_HEND: 6                        ; set per LDO Orbiter v2.0 instructions
driver_HSTRT: 7                       ; set per LDO Orbiter v2.0 instructions
driver_TOFF: 4                        ; set per LDO Orbiter v2.0 instructions

[filament_switch_sensor filament_sensor]
switch_pin: ^EBBCan: PB6
pause_on_runout: True
insert_gcode:
    { action_respond_info("Insert Detected") }  
runout_gcode:
    { action_respond_info("Runout Detected") }
    {% if printer.print_stats.state == "printing" %}
      _FIL_CHANGE_PARK
    {% endif %}

