[led Printer_Lights]
white_pin: PF9 #<<<<<<<< ADD YOUR OWN PIN
cycle_time: 0.0010
initial_WHITE: 1.0

[temperature_sensor CM5]
## Rasp_PI CM5 module ##
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor BTT_M8P]
## BTT Manta M8P ##
sensor_type: temperature_mcu
max_temp: 100

[temperature_sensor EBBCan]
## BTT EBB36 Can ##
sensor_type: temperature_mcu
sensor_mcu: EBBCan

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

####################################
# HOMING & BED ADJUSTMENT ROUTINES #
####################################

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600

# [safe_z_home]                         ; enable for BLTouch
# home_xy_position: 185, 185            ; Changed from '211, 211' [DigitalDragon79] config on 22-Nov-25 for Mercury One.1
# speed: 200
# z_hop: 10
#z_hop_speed: 20

[z_tilt]
z_positions: 11.5, 8 #stepper_z Mini Tank
  187.5, 362 #stepper_z1 Mini Tank
  361.5, 8 #stepper_z2 Mini Tank
points: 187.5,370  #probe location Right Rear
#  40,370 #probe location Left Rear
  40,35 #probe location Left Front
  370,35 #probe location Right Front
speed: 200
horizontal_move_z: 2.0
retries: 8 # Number of times to retry if the probed points aren't within tolerance.
retry_tolerance:0.015

#[z_tilt]
##  Use Z_TILT_ADJUST to level the bed
##  z_positions: Location of toolhead
#z_positions: 14, 10                   ; Front Left Mini Tank
#  187.5, 359                          ; Rear Center Mini Tank
#  363, 10                             ; Front Right Mini Tank
#points: 40, 30                        ; Front Left Mini Tank (14, 10)
#  211, 379                            ; Rear Center Rear Mini Tank (187.5, 359)
#  370, 30                             ; Front Right Mini Tank (363, 10)
#speed: 400
#horizontal_move_z: 30
#retries: 5 # Number of times to retry if the probed points aren't within tolerance.
#retry_tolerance:0.025

###################
# PROBING SECTION #
###################

[bed_mesh]
horizontal_move_z: 2.0
speed: 300
mesh_min: 60, 30  # modify these according to the below guide. If the probe cannot reach then you will get a klipper error when trying to scan a bed mesh.
mesh_max: 328, 340 # modify these according to the below guide. If the probe cannot reach then you will get a klipper error when trying to scan a bed mesh.
probe_count: 25, 25
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -34.25 # INSERT VALUE FOR YOUR PROBE POSITION
y_offset: -14.66 # INSERT VALUE FOR YOUR PROBE POSITION
write_tap_plot: true

