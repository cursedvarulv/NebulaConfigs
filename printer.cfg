# This file contains common pin mappings for the BIGTREETECH Manta M8P V2.0
# To use this config, the firmware should be compiled for the
# STM32H723 with a "128KiB bootloader" "25 MHz crystal"
# and "USB (on PA11/PA12)", "CAN bus (on PD0/PD1)" or Serial (on USART1 PA10/PA9).

# See docs/Config_Reference.md for a description of parameters.

#########################
# COMMUNICATION SECTION #
#########################

[mcu]
##	Obtain mcu value by "ls -l /dev/serial/by-id/"
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_3F0025001351313531383332-if00
# canbus_uuid:a2ceb1da41ce
restart_method: command

[mcu eddy]
canbus_uuid: 61cec9923443

#########################
# Mainsail requirements #
#########################

[virtual_sdcard]
path: ~/printer_data/gcodes

[exclude_object]

[display_status]

#[pause_resume]

[save_variables]
filename = ~/demon_vars.cfg

[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 0.8
retract_speed: 30
unretract_extra_length: 0.0
unretract_speed: 30

###################
# Includes SECTION #
###################

[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Demon_User_Files_Handler_v*.cfg]
[include ./KAMP_LiTE/*.cfg]
[include ./Heat_Soak.cfg]
#[include ./Demon_BTT_Eddy_Offset.cfg]
[include ./mainsail.cfg]
[include ./My_Macros.cfg]
[include ./toolhead_BTT_EBB36_canbus_v1.2.cfg]
[include ./beep.cfg]
[include ./timelapse.cfg]
#[include ./config_backup.cfg]
[include ./Toolheat_Led.cfg]
#[include macros.cfg]
#[include Orbiter2_SmartSensor.cfg]

######################
# KINEMATICS SECTION #
######################

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000                 # Max 4000
#max_accel_to_decel: 1000
max_z_velocity: 15              # Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

###################
# DISPLAY SECTION #
###################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,
    
    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>
    
    # See the sample-lcd.cfg file for definitions of common LCD displays.
    
[display]
lcd_type: emulated_st7920
en_pin: EXP1_7
spi_software_sclk_pin: EXP1_6
spi_software_mosi_pin: EXP1_8
spi_software_miso_pin: PA3
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: PF7

#[pwm_cycle_time _BEEPER_pin]
#pin = EXP1_1
#value = 0
#shutdown_value = 0
#cycle_time = 0.001

##################
# MOTION SECTION #
##################

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: ^EBBCan: PB3     # Default: ^PF4
position_endstop: 370
position_max: 370
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

## Motor1
[tmc2209 stepper_x]
uart_pin: PC13
interpolate: False
##diag_pin: PF4 
run_current: 1.000
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: ^PF3
position_endstop: 370
position_max: 370
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

## Motor2
[tmc2209 stepper_y]
uart_pin: PE3
interpolate: False
##diag_pin: PF3
run_current: 1.000
sense_resistor: 0.110
stealthchop_threshold: 0

## Z0 Stepper - Front Left on Motor3_A
[stepper_z]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 4                    ; Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
#endstop_pin: ^PF2                      ; disable to use BLTouch
#position_endstop: 0                    ; disable to use BLTouch
endstop_pin: probe:z_virtual_endstop    # enable to use BLTouch
position_min: -10                       ; enable to use BLTouch
position_max: 410
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 5

## Motor3_A
[tmc2209 stepper_z]
uart_pin: PB9
interpolate: False
##diag_pin: PF2
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

## Z1 Stepper - Rear Center on Motor4
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
microsteps: 32
rotation_distance: 4                    ; Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
#endstop_pin: PF0                       ; disable endstop on multiple Z setup

## Motor4
[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: False
##diag_pin: PF1
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

## Z2 Stepper - Front Right on Motor5
[stepper_z2]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 32
rotation_distance: 4                   ; Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
#endstop_pin: PF0                      ; disable endstop on multiple Z setup

## Motor5
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: False
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

